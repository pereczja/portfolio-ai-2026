<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Vakfolt — 1337</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'PP Editorial Old';
            src: local('PPEditorialNew-Ultralight'), local('PP Editorial New Ultralight');
            font-weight: 200;
            font-style: normal;
        }

        :root {
            --bg: #FBFAF4;
            --dark: #1c1917;
            --purple: #783FF3;
            --stone-light: #a8a29e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--dark);
            color: var(--bg);
            font-family: 'DM Mono', Consolas, monospace;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 56px 80px;
        }

        .full__inner {
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .full__inner img {
            max-width: 100%;
            max-height: 52vh;
            object-fit: contain;
            border-radius: 4px;
            margin-bottom: 28px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        .label {
            font-family: 'DM Mono', Consolas, monospace;
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(120, 63, 243, 0.7);
            margin-bottom: 20px;
        }

        .headline {
            font-family: 'PP Editorial Old', 'Playfair Display', Georgia, serif;
            font-weight: 200;
            font-size: 2.6rem;
            line-height: 1.15;
            margin-bottom: 20px;
            text-align: center;
        }

        .body {
            font-family: 'DM Mono', Consolas, monospace;
            font-size: 0.85rem;
            line-height: 1.7;
            color: var(--stone-light);
            max-width: 680px;
            text-align: center;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .label { animation: fadeUp 0.45s ease-out backwards; }
        .headline { animation: fadeUp 0.45s ease-out 0.08s backwards; }
        .body { animation: fadeUp 0.45s ease-out 0.16s backwards; }
        img { animation: fadeUp 0.45s ease-out 0.12s backwards; }
    </style>
</head>
<body>
    <div class="slide">
        <div class="full__inner">
            <div class="label">A vakfolt</div>
            <h1 class="headline">Így láttuk<br>az intelligenciát</h1>
            <img src="assets/distorted-intelligence.png" alt="Our Distorted View of Intelligence">
            <p class="body">
                Az Einstein és egy átlagember közötti különbség elenyésző az univerzum skáláján. De mi azt hittük, az AI messze van tőlünk.
            </p>
        </div>
    </div>
</body>
</html>
