<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Jóslat — 1337</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'PP Editorial Old';
            src: local('PPEditorialNew-Ultralight'), local('PP Editorial New Ultralight');
            font-weight: 200;
            font-style: normal;
        }

        :root {
            --bg: #FBFAF4;
            --text: #111111;
            --purple: #783FF3;
            --stone-dark: #44403c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', Consolas, monospace;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .split__img {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
            background: white;
        }

        .split__img img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 4px;
        }

        .split__txt {
            padding: 64px 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label {
            font-family: 'DM Mono', Consolas, monospace;
            font-size: 0.62rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--purple);
            margin-bottom: 20px;
        }

        .headline {
            font-family: 'PP Editorial Old', 'Playfair Display', Georgia, serif;
            font-weight: 200;
            font-size: 2.6rem;
            line-height: 1.15;
            margin-bottom: 20px;
        }

        .body {
            font-family: 'DM Mono', Consolas, monospace;
            font-size: 0.85rem;
            line-height: 1.7;
            color: var(--stone-dark);
            max-width: 440px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .label { animation: fadeUp 0.45s ease-out backwards; }
        .headline { animation: fadeUp 0.45s ease-out 0.08s backwards; }
        .body { animation: fadeUp 0.45s ease-out 0.16s backwards; }
        img { animation: fadeUp 0.45s ease-out 0.12s backwards; }
    </style>
</head>
<body>
    <div class="slide">
        <div class="split__img">
            <img src="assets/urban-progress-explosion.png" alt="Human Progress — exponential explosion">
        </div>
        <div class="split__txt">
            <div class="label">A jóslat</div>
            <h1 class="headline">Ha az exponenciális<br>kitart...</h1>
            <p class="body">
                Az emberiség történelmének legnagyobb ugrása. Egy generáción belül.
            </p>
        </div>
    </div>
</body>
</html>
